name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Checkout cached GTFS-RT data
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: cache-data
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Merge cached data into dist
        run: |
          if [ -d cache-data/cache ]; then
            mkdir -p dist/cache
            cp -r cache-data/cache/* dist/cache/
            echo "Merged $(find cache-data/cache -type f | wc -l) cache files"
          else
            echo "No cache data found yet — site will fetch live from ttc.ca"
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deploy
        uses: actions/deploy-pages@v4
